
services:
  dasdasd:
    image: postgres:latest
    container_name: bbq
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: bbq_db
    ports:
      - "5437:5432"
    deploy:
      resources:
        limits:
          cpus: 0.50
          memory: 512M
        reservations:
          cpus: 0.25
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d bbq_db" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    
  mysql_db:
    image: mysql:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: bbq_db
      MYSQL_USER: mysql
      MYSQL_PASSWORD: 1234
    volumes:
      - ./mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"